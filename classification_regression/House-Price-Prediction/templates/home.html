<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>House Price Prediction</title>
    <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet' type='text/css'>
    <link href='https://fonts.googleapis.com/css?family=Arimo' rel='stylesheet' type='text/css'>
    <link href='https://fonts.googleapis.com/css?family=Hind:300' rel='stylesheet' type='text/css'>
    <link href='https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300' rel='stylesheet' type='text/css'>

    <style>
      .login {
        width: 400px;
        margin: 30px auto;
        font-family: 'Open Sans Condensed', sans-serif;
      }
      
      h1 {
        font-size: 2em;
        text-align: center;
        font-family: 'Pacifico', cursive;
        color: #3b3e47;
        margin-bottom: 50px;
      }
      label {
        font-size: 1.2em;
        font-family: 'Arimo', sans-serif;
        color: #3b3e47;
        margin-bottom: 10px;
      }
      input[type="text"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
        border: none;
        border-bottom: 2px solid #3b3e47;
        font-size: 1.2em;
        font-family: 'Arimo', sans-serif;
      }
      
      button[type="submit"] {
        display: block;
        width: 100%;
        padding: 10px;
        background-color: #3b3e47;
        color: #fff;
        border: none;
        border-radius: 5px;
        font-size: 1.2em;
        font-family: 'Arimo', sans-serif;
        cursor: pointer;
      }
      .result-text {
    font-size: 1.5em;
    font-weight: bold;
    text-align: center;
    color: #3b3e47;
    margin-top: 50px;
  }

      body {
  background-color: rgba(255, 255, 255, 0.9);
}


      
      button[type="submit"]:hover {
        background-color: #2b2e37;
      }
    </style>
  </head>

<body>
 <div class="login">
	<h1>Boston House Price Prediction</h1>

     <!-- Main Input For Receiving Query to our ML -->
    <form action="{{ url_for('predict')}}"method="post">
      <label for="CRIM">CRIM:</label>
      <input type="text" name="CRIM" placeholder="Ex: 0.00632" required="required" /><br>
      <label for="ZN">ZN:</label>
    	<input type="text" name="ZN" placeholder="Ex: 18.00" required="required" /><br>
      <label for="INDUS">INDUS:</label>
        <input type="text" name="INDUS" placeholder="Ex: 2.31" required="required" /><br>
        <label for="CHAS">CHAS:</label> <br>
        <input type="radio" name="CHAS" value="1" />Yes
        <input type="radio" checked name="CHAS" value="0" />No<br><br>
        <label for="NOX">NOX:</label>
        <input type="text" name="NOX" placeholder="Ex: 0.538" required="required" /><br>
        <label for="RM">RM:</label>
        <input type="text" name="RM" placeholder="Ex: 6.575" required="required" /><br>
        <label for="Age">Age:</label>
        <input type="text" name="Age" placeholder="Ex: 65.2" required="required" /><br>
        <label for="DIS">DIS:</label>
        <input type="text" name="DIS" placeholder="Ex: 4.0900" required="required" /><br>
        <label for="RAD">RAD:</label>
        <input type="text" name="RAD" placeholder="Ex: 1" required="required" /><br>
        <label for="TAX">TAX:</label>
        <input type="text" name="TAX" placeholder="Ex: 296" required="required" /><br>
        <label for="PTRATIO">PTRATIO:</label>
        <input type="text" name="PTRATIO" placeholder="Ex: 15.3" required="required" /><br>
        <label for="B">B:</label>
        <input type="text" name="B" placeholder="Ex: 396.90" required="required" /><br>
        <label for="LSTAT">LSTAT:</label>
        <input type="text" name="LSTAT" placeholder="Ex: 4.98" required="required" /><br>

        <button type="submit" class="btn btn-primary btn-block btn-large">Predict</button>
    </form>

   <br>
   <br>
  
   
 </div>
 <p class="result-text">{{prediction_text}}</p>

</body>
</html>
