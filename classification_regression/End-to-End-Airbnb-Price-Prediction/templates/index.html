<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='style.css')}}">
    <title>Airbnb Price Prediction</title>
    <style>
        body {
            background: #f6f8fa;
            font-family: Arial, sans-serif;
            color: #222;
        }
        h1 {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 30px;
        }
        form {
            background: #fff;
            max-width: 750px;
            margin: 32px auto 0 auto;
            padding: 28px 40px 24px 40px;
            border-radius: 10px;
            box-shadow: 0px 4px 22px rgba(0,0,0,0.08);
        }
        .css-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            margin-bottom: 18px;
        }
        .form-group {
            flex: 1 1 230px;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            margin-bottom: 3px;
            font-weight: 500;
        }
        select, input[type="number"] {
            padding: 7px 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1em;
        }
        input[type="submit"] {
            margin-top: 18px;
            width: 100%;
            background: #249ed9;
            color: #fff;
            font-weight: 600;
            border: none;
            border-radius: 5px;
            padding: 13px;
            font-size: 1.13em;
            cursor: pointer;
            transition: background 0.2s;
        }
        input[type="submit"]:hover {
            background: #197cb8;
        }
        #result {
            max-width: 480px;
            margin: 38px auto 0 auto;
            text-align: center;
            background: #f2fbf8;
            border-radius: 7px;
            padding: 17px 27px 17px 27px;
            box-shadow: 0 2px 12px rgba(37,145,152,0.07);
        }
        #finalResult {
            color: #1B914B;
            font-weight: bold;
            font-size: 1.28em;
        }

        @media (max-width: 600px) {
            form {
                padding: 16px 6px;
            }
            .css-flex {
                flex-direction: column;
                gap: 12px;
            }
        }
        .form-group input{
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <h1>Airbnb Price Prediction</h1>
    <form action="{{url_for('home')}}" method="POST">

        <!-- Row 1: Property type, Room type -->
        <div class="css-flex">
            <div class="form-group">
                <label for="propertytype">Property Type:</label>
                <select name="propertytype" id="propertytype" required>
                    <option value="Apartment">Apartment</option>
                    <option value="House">House</option>
                    <option value="Condominium">Condominium</option>
                    <option value="Townhouse">Townhouse</option>
                    <option value="Loft">Loft</option>
                    <option value="Other">Other</option>
                    <option value="Guesthouse">Guesthouse</option>
                    <option value="Bed & Breakfast">Bed & Breakfast</option>
                    <option value="Bungalow">Bungalow</option>
                    <option value="Villa">Villa</option>
                    <option value="Dorm">Dorm</option>
                    <option value="Guest suite">Guest suite</option>
                    <option value="Camper/RV">Camper/RV</option>
                    <option value="Timeshare">Timeshare</option>
                    <option value="Cabin">Cabin</option>
                    <option value="In-law">In-law</option>
                    <option value="Hostel">Hostel</option>
                    <option value="Boutique hotel">Boutique hotel</option>
                    <option value="Boat">Boat</option>
                    <option value="Serviced apartment">Serviced apartment</option>
                    <option value="Tent">Tent</option>
                    <option value="Castle">Castle</option>
                    <option value="Vacation home">Vacation home</option>
                    <option value="Yurt">Yurt</option>
                    <option value="Hut">Hut</option>
                    <option value="Treehouse">Treehouse</option>
                    <option value="Chalet">Chalet</option>
                    <option value="Earth House">Earth House</option>
                    <option value="Tipi">Tipi</option>
                    <option value="Train">Train</option>
                    <option value="Cave">Cave</option>
                    <option value="Casa particular">Casa particular</option>
                    <option value="Parking Space">Parking Space</option>
                    <option value="Lighthouse">Lighthouse</option>
                    <option value="Island">Island</option>
                </select>
            </div>

            <div class="form-group">
                <label for="roomtype">Room Type:</label>
                <select name="roomtype" id="roomtype" required>
                    <option value="Entire home/apt">Entire home/apt</option>
                    <option value="Private room">Private room</option>
                    <option value="Shared room">Shared room</option>
                </select>
            </div>
        </div>

        <!-- Row 2: City, Cancellation Policy -->
        <div class="css-flex">
            <div class="form-group">
                <label for="city">City:</label>
                <select name="city" id="city" required>
                    <option value="NYC">NYC</option>
                    <option value="SF">SF</option>
                    <option value="DC">DC</option>
                    <option value="LA">LA</option>
                    <option value="Chicago">Chicago</option>
                    <option value="Boston">Boston</option>
                </select>
            </div>

            <div class="form-group">
                <label for="canceltype">Cancellation Policy:</label>
                <select name="canceltype" id="canceltype" required>
                    <option value="flexible">Flexible</option>
                    <option value="moderate">Moderate</option>
                    <option value="strict">Strict</option>
                    <option value="super_strict_30">Super Strict 30</option>
                    <option value="super_strict_60">Super Strict 60</option>
                </select>
            </div>
        </div>

        <!-- Row 3: Amenities, Accommodates -->
        <div class="css-flex">
            <div class="form-group">
                <label for="amenties">Number of Amenities:</label>
                <input type="number" name="amenties" id="amenties" value="0" min="0" required>
            </div>
            <div class="form-group">
                <label for="accommodates">Accommodates:</label>
                <input type="number" name="accommodates" id="accommodates" value="0" min="0" required>
            </div>
        </div>

        <!-- Row 4: Bathrooms, Bed Type -->
        <div class="css-flex">
            <div class="form-group">
                <label for="bathrooms">Number of Bathrooms:</label>
                <input type="number" name="bathrooms" id="bathrooms" value="0" min="0" required>
            </div>
            <div class="form-group">
                <label for="bedtype">Bed Type:</label>
                <select name="bedtype" id="bedtype" required>
                    <option value="Real Bed">Real Bed</option>
                    <option value="Futon">Futon</option>
                    <option value="Pull-out Sofa">Pull-out Sofa</option>
                    <option value="Airbed">Airbed</option>
                    <option value="Couch">Couch</option>
                </select>
            </div>
        </div>

        <!-- Row 5: Bedrooms, Beds -->
        <div class="css-flex">
            <div class="form-group">
                <label for="bedrooms">Number of Bedrooms:</label>
                <input type="number" name="bedrooms" id="bedrooms" value="0" min="0" required>
            </div>
            <div class="form-group">
                <label for="beds">Number of Beds:</label>
                <input type="number" name="beds" id="beds" value="0" min="0" required>
            </div>
        </div>

        <!-- Row 6: Cleaning Fee, Instant Bookable -->
        <div class="css-flex">
            <div class="form-group">
                <label for="clean">Cleaning Fee:</label>
                <select name="clean" id="clean" required>
                    <option value="True">Yes</option>
                    <option value="False">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="instbook">Instant Bookable:</label>
                <select name="instbook" id="instbook" required>
                    <option value="t">Yes</option>
                    <option value="f">No</option>
                </select>
            </div>
        </div>

        <!-- Row 7: Host Has Profile Pic, Host Identity Verified -->
        <div class="css-flex">
            <div class="form-group">
                <label for="dp">Host Has Profile Pic:</label>
                <select name="dp" id="dp" required>
                    <option value="t">Yes</option>
                    <option value="f">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="verify">Host Identity Verified:</label>
                <select name="verify" id="verify" required>
                    <option value="t">Yes</option>
                    <option value="f">No</option>
                </select>
            </div>
        </div>

        <!-- Row 8: Host Response Rate, Number of Reviews -->
        <div class="css-flex">
            <div class="form-group">
                <label for="hostresponse">Host Response Rate (%):</label>
                <input type="number" name="hostresponse" id="hostresponse" value="0" min="0" max="100" required>
            </div>
            <div class="form-group">
                <label for="review">Number of Reviews:</label>
                <input type="number" name="review" id="review" value="0" min="0" required>
            </div>
        </div>

        <!-- Row 9: Review Scores Rating -->
        <div class="css-flex">
            <div class="form-group">
                <label for="overallreview">Review Scores Rating:</label>
                <input type="number" name="overallreview" id="overallreview" value="0" min="0" max="100" step="1" required>
            </div>
        </div>

        <!-- Row 10: Location (Latitude, Longitude) -->
        <div class="css-flex">
            <div class="form-group">
                <label for="lat">Latitude:</label>
                <input type="number" name="lat" id="lat" value="0" step="0.000001" required>
            </div>
            <div class="form-group">
                <label for="long">Longitude:</label>
                <input type="number" name="long" id="long" value="0" step="0.000001" required>
            </div>
        </div>

        <input type="submit" value="Predict Price">

    </form>

    <div id="result">
        <h3>Your Airbnb Room Price will be <span id="finalResult">{{final_result}}$</span></h3>
    </div>

</body>
</html>
